spring.application.name=MealMitra

# ===============================
# Server
# ===============================
server.port=9999

# ===============================
# Database (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/mealmitra03?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=sks1023
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# Jackson
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false

# ===============================
# CORS (Frontend Connection)
# ===============================
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===============================
# Logging (optional)
# ===============================
logging.level.org.springframework.security=DEBUG
